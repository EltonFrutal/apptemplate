<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppTemplate — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3b6ef8;--blue-l:#ebf0ff;--blue-m:#c7d4fd;
  --green:#12b76a;--red:#ef4444;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --bg:#f0f4ff;--bg2:#fff;--border:#dde3f0;
  --shadow:0 2px 12px rgba(59,110,248,.1);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:linear-gradient(135deg,#1e3a8a,#3b6ef8 50%,#6366f1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.18);}
.logo{text-align:center;margin-bottom:32px;}
.logo-title{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text);}
.logo-title span{color:var(--blue);}
.logo-sub{font-size:13px;color:var(--text3);margin-top:4px;font-family:var(--mono);}
.form-group{margin-bottom:18px;}
label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;font-family:var(--mono);}
input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
input:focus{border-color:var(--blue);background:#fff;}
input::placeholder{color:var(--text3);}
.btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;margin-top:8px;}
.btn:hover{background:#2d5ee8;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.erro{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.versao{text-align:center;margin-top:24px;font-size:11px;color:var(--text3);font-family:var(--mono);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-title">app<span>template</span></div>
    <div class="logo-sub">sistema de gestão</div>
  </div>
  {% if erro %}
  <div class="erro">⚠ {{ erro }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="seu@email.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Entrar</button>
  </form>
  <div class="versao">v1.0 · AppTemplate</div>
</div>
</body>
</html>
